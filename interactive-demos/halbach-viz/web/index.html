<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halbach Electromagnetic Gravity Storage — 3D</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0e14; font-family: 'Segoe UI', system-ui, sans-serif; color: #ebebf0; }
      #c { display: block; width: 100%; height: 100%; }
      aside {
        position: absolute; top: 16px; left: 16px; width: min(360px, calc(100vw - 32px));
        background: rgba(12,14,20,0.88); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px; padding: 16px; backdrop-filter: blur(10px);
      }
      h1 { font-size: 16px; margin-bottom: 6px; }
      .sub { font-size: 11px; color: #59adff; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
      p { font-size: 12px; line-height: 1.45; color: rgba(235,235,240,0.8); margin-bottom: 10px; }
      .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
      .metrics div { font-size: 11px; color: rgba(235,235,240,0.55); }
      .metrics strong { display: block; font-size: 14px; color: #ebebf0; }
      button { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: inherit; cursor: pointer; margin-top: 6px; }
      input[type=range] { width: 100%; margin-top: 4px; }
      label { font-size: 11px; display: block; margin-top: 8px; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <aside>
      <div class="sub">EcoDrop · Electromagnetic System</div>
      <h1>Halbach Tubular Linear Motor Tower</h1>
      <p>Four 6-phase tubular motors with Halbach arrays lift a 50 kg payload. Flux glow scales with thrust. Separate hoist maintains rope tension.</p>
      <div class="metrics">
        <div>Height<strong id="m-h">0.00 m</strong></div>
        <div>Phase<strong id="m-p">Lift</strong></div>
        <div>Thrust<strong id="m-f">0 N</strong></div>
        <div>Flux<strong id="m-b">0%</strong></div>
      </div>
      <label>Cycle scrub<input id="scrub" type="range" min="0" max="1000" value="0" /></label>
      <label>Speed<input id="speed" type="range" min="0.25" max="3" step="0.25" value="1" /></label>
      <button id="play">Pause</button>
      <button id="flux">Toggle flux glow</button>
    </aside>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.169.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/" } }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
